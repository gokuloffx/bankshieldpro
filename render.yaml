services:
  - type: web
    name: bankshield-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "*"
    disk:
      name: bankshield-data
      mountPath: /tmp
      sizeGB: 1
